name: student_agent
description: Student Agent — personalized learning support app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.4
  flutter_dotenv: ^5.1.0
  dio: ^5.4.3
  fl_chart: ^0.67.0
  intl: ^0.19.0
  collection: ^1.18.0
  shared_preferences: ^2.2.3
  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0
  file_picker: ^8.0.0
  pdfx: ^2.5.0 
  path_provider: ^2.1.0  # để lưu file tạm

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - .env
